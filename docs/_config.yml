# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Blake Byer
email: blake.byer@uky.edu
description: >-
  This is the personal webpage of Blake Byer.
baseurl: "" 
url: "https://blakebyer.github.io/"
github_username: blakebyer

# Use remote Cayman theme from GitHub Pages
remote_theme: "mmistakes/minimal-mistakes@4.27.1"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-graphviz
show_downloads: false
graphviz:
  format: svg
header_pages:
  - index.md
  - blog.md
  - projects.md
  - about.md
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      show_date: true
      comments: false
      share: false
      related: true

search: true
enable_copy_code_button: true
include:
  - assets
  - plugins
author:
  name: "Blake Byer"
  avatar: "/assets/images/profile3.jpg"   # path to your image
  bio: "Systems neuroscience researcher"
  location: "USA"
  email: "bbyer04@gmail.com"
  links:
  - label: "GitHub"
    icon: "fab fa-fw fa-github"
    url: "https://github.com/blakebyer"
  - label: "LinkedIn"
    icon: "fab fa-fw fa-linkedin"
    url: "https://linkedin.com/in/blake-byer"
  - label: "Instagram"
    icon: "fab fa-fw fa-instagram"
    url: "https://instagram.com/memreneuro"

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
