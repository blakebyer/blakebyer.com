<script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.1.1/wordcloud2.js"></script>

<!-- Use a flex container to center the canvas -->
<div style="display: flex; justify-content: center; align-items: center; height: 100%;">
  <canvas id="my_cloud" width="960" height="500"></canvas>
</div>

<script>
WordCloud(document.getElementById('my_cloud'), {
  list: [
    ['neuroscience', 75],
    ['systems biology', 65],
    ['synthetic biology', 60],
    ['machine learning', 50],
    ['data visualization', 48],
    ['rare diseases', 57],
    ['genetics', 45],
    ['ontology', 45],
    ['entrepeneurship', 40],
    ['public health', 62]
  ],
  gridSize: 4,
  backgroundColor: 'white',
  color: 'random-dark',
  rotateRatio: 0.3,
  shuffle: true,
  shape: 'circle',
  drawOutOfBound: false,
  shrinkToFit: true
});
</script>
