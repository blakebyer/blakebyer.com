<script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.1.1/wordcloud2.js"></script>

<div style="text-align:center;">
  <canvas id="my_cloud" width="960" height="500"></canvas>
</div>

<script>
WordCloud(document.getElementById('my_cloud'), {
  list: [
    ['neuroscience', 85],
    ['systems biology', 65],
    ['synthetic biology', 63],
    ['machine learning', 50],
    ['data visualization', 48],
    ['rare diseases', 57],
    ['genetics', 45],
    ['ontology', 43],
    ['entrepeneurship', 40],
    ['public health', 60]
  ],
  gridSize: 4,            // smaller = denser words
  backgroundColor: 'white',
  color: 'random-dark',
  rotateRatio: 0.3,
  shuffle: true,
  shape: 'circle',
  drawOutOfBound: true,
  shrinkToFit: true
});
</script>
